<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0d0d0d;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5rem;
        font-weight: 600;
        letter-spacing: 1px;
    }

    /* Profile button */
    a.profile {
        display: inline-block;
        margin: 15px 0 30px;
        color: white;
        background: #2563eb;
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 1rem;
        transition: 0.3s;
    }

    a.profile:hover {
        background: #1e4fd6;
        transform: scale(1.05);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        padding: 20px;
        max-width: 1200px;
        margin: auto;
    }

    .grid img {
        width: 100%;
        border-radius: 10px;
        cursor: pointer;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.5s ease;
    }

    .grid img.loaded {
        opacity: 1;
        transform: translateY(0);
    }

    .grid img:hover {
        transform: scale(1.03);
    }

    /* fullscreen viewer */
    .viewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: 0.3s;
    }

    .viewer.active {
        opacity: 1;
        pointer-events: all;
    }

    .viewer img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 10px;
    }

    /* Description */
    .description {
        margin: 60px auto 40px;
        max-width: 700px;
        font-size: 1rem;
        color: #ccc;
        line-height: 1.6;
        padding: 0 20px;
    }
</style>
</head>

<body>

<h1>Portfolio</h1>

<a class="profile" href="https://www.roblox.com/users/1098190644/profile?friendshipSourceType=PlayerSearch" target="_blank">
    Profile
</a>

<div class="grid" id="grid"></div>

<div class="viewer" id="viewer">
    <img id="viewerImg">
</div>

<!-- Description -->
<div class="description">
    I have 1 year of Building experience, and i can do Simple builds (Studs, Low Poly and More), aswell as Obbies, i can also build small samples before doing commissions<br><br>
    contributed to 1M visits
</div>

<script>
const username = "luckyman9299og";
const repo = "Portfolio3";
const path = "";

const grid = document.getElementById("grid");
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`)
    .then(res => res.json())
    .then(files => {
        console.log(files);

        files.forEach(file => {
            if (file.name.match(/\.(jpg|jpeg|png)$/i)) {

                const img = document.createElement("img");
                img.src = file.download_url;

                img.onload = () => {
                    img.classList.add("loaded");
                };

                img.onclick = () => {
                    viewerImg.src = img.src;
                    viewer.classList.add("active");
                };

                grid.appendChild(img);
            }
        });
    })
    .catch(err => console.error("Error loading images:", err));

viewer.onclick = () => {
    viewer.classList.remove("active");
};
</script>

</body>
</html>
